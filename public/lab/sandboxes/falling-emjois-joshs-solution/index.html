<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>falling-emjois-joshs-solution</title>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./styles.css" />
      <link rel="stylesheet" href="./lab-embed.css" />
  </head>
  <body>
<style>
  @keyframes fall {
    from {
      transform: translateX(-50%) translateY(-100%);
    }
    to {
      transform: translateX(-50%) translateY(120px);
    }
  }

  .emojiWrapper {
    height: 120px;
    font-size: 2rem;
    overflow: hidden;
    user-select: none;
  }
  .emoji {
    position: absolute;
    top: 0;
    animation: fall linear forwards;
  }
</style>
<main>
  <div class="emojiWrapper"></div>
  <img class="avatar" src="./avatar.svg" alt="user avatar" />
  <h1>Someone Bought You A Coffee!</h1>
</main>

    <script type="module" src="./index.js"></script>
  </body>
</html>
